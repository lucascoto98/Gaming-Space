<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaming Space</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    text-align: center;
    margin:0;
}

header{
    background:#1e1e1e;
    padding:20px;
    font-size:28px;
    font-weight:bold;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:30px;
}

.game{
    background:#1f1f1f;
    padding:20px;
    border-radius:12px;
    transition:0.2s;
}

.game:hover{
    transform:scale(1.05);
}

button{
    margin-top:10px;
    padding:10px 18px;
    border:none;
    border-radius:8px;
    background:#00c3ff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0099cc;
}
</style>
</head>

<body>

<header>Gaming Space</header>

<div class="container">

<div class="game">
<h2>Neon Jump</h2>
<a href="https://lucascoto98.github.io/neon-jump-game/" target="_blank">
<button>Jogar</button>
</a>
</div>

<div class="game">
<h2>Snake Game</h2>
<a href="https://lucascoto98.github.io/Snake-Game---Pro/" target="_blank">
<button>Jogar</button>
</a>
</div>

<div class="game">
<h2>Square Survivor</h2>
<a href="https://lucascoto98.github.io/square-survivor/" target="_blank">
<button>Jogar</button>
</a>
</div>

<div class="game">
<h2>Fireeee</h2>
<a href="https://lucascoto98.github.io/Fireeee/" target="_blank">
<button>Jogar</button>
</a>
</div>

<div class="game">
<h2>Kick Ball</h2>
<a href="https://lucascoto98.github.io/Kick-Ball/" target="_blank">
<button>Jogar</button>
</a>
</div>

<div class="game">
<h2>Game Car</h2>
<a href="https://lucascoto98.github.io/game-car/" target="_blank">
<button>Jogar</button>
</a>
</div>

</div>
