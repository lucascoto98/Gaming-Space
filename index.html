<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Gaming Space</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

body {
    background: #0f172a;
    color: white;
}

/* TÍTULO */
h1 {
    text-align: center;
    margin: 20px;
    font-size: 3em;
    color: #38bdf8;
}

/* GRID */
.games {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* CARDS */
.card {
    background: #1e293b;
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

/* IMAGEM ANIMADA */
.preview {
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    position: relative;
    overflow: hidden;
}

/* CORES */
.tower { background: linear-gradient(45deg,#22c55e,#4ade80); }
.runner { background: linear-gradient(45deg,#06b6d4,#0ea5e9); }
.neon { background: linear-gradient(45deg,#a855f7,#ec4899); }
.fire { background: linear-gradient(45deg,#f97316,#ef4444); }
.snake { background: linear-gradient(45deg,#84cc16,#22c55e); }
.square { background: linear-gradient(45deg,#eab308,#facc15); }
.ball { background: linear-gradient(45deg,#38bdf8,#6366f1); }
.car { background: linear-gradient(45deg,#f43f5e,#e11d48); }

/* ANIMAÇÃO BRILHO */
.preview::after {
    content: "";
    position: absolute;
    width: 200%;
    height: 100%;
    background: rgba(255,255,255,0.1);
    transform: rotate(25deg);
    animation: shine 3s linear infinite;
}

@keyframes shine {
    from { left: -100%; }
    to { left: 100%; }
}

.card h3 {
    padding: 10px;
    text-align: center;
}

/* BOTÃO */
.play {
    display: block;
    margin: 10px;
    padding: 10px;
    background: #38bdf8;
    color: black;
    border-radius: 10px;
    text-align: center;
    text-decoration: none;
    font-weight: bold;
}
</style>

</head>
<body>

<h1>🎮 Gaming Space</h1>

<div class="games">

<div class="card">
<div class="preview tower">🏰</div>
<h3>Tower Defense</h3>
<a class="play" href="https://lucascoto98.github.io/TOWERDEFENSE/" target="_blank">Jogar</a>
</div>

<div class="card">
<div class="preview runner">🏃</div>
<h3>Cyber Runner</h3>
<a class="play" href="https://lucascoto98.github.io/CYBER-RUNNER/" target="_blank">Jogar</a>
</div>

<div class="card">
<div class="preview neon">🌈</div>
<h3>Neon Jump</h3>
<a class="play" href="https://lucascoto98.github.io/neon-jump-game/" target="_blank">Jogar</a>
</div>

<div class="card">
<div class="preview fire">🔥</div>
<h3>Fireeee</h3>
<a class="play" href="https://lucascoto98.github.io/Fireeee/" target="_blank">Jogar</a>
</div>

<div class="card">
<div class="preview snake">🐍</div>
<h3>Snake Pro</h3>
<a class="play" href="https://lucascoto98.github.io/Snake-Game---Pro/" target="_blank">Jogar</a>
</div>

<div class="card">
<div class="preview square">🟨</div>
<h3>Square Survivor</h3>
<a class="play" href="https://lucascoto98.github.io/square-survivor/" target="_blank">Jogar</a>
</div>

<div class="card">
<div class="preview ball">⚽</div>
<h3>Kick Ball</h3>
<a class="play" href="https://lucascoto98.github.io/Kick-Ball/" target="_blank">Jogar</a>
</div>

<div class="card">
<div class="preview car">🚗</div>
<h3>Game Car</h3>
<a class="play" href="https://lucascoto98.github.io/game-car/" target="_blank">Jogar</a>
</div>

</div>

</body>
</html>
