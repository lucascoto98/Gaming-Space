<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Gaming Space</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    text-align: center;
}

h1 {
    margin: 20px;
    font-size: 3em;
    color: #38bdf8;
}

.games {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: #1e293b;
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.card h3 {
    margin: 10px 0;
}

.play-btn {
    display: inline-block;
    margin-bottom: 15px;
    padding: 10px 20px;
    background: #38bdf8;
    color: black;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
}
</style>

</head>
<body>

<h1>🎮 Gaming Space</h1>

<div class="games">

<div class="card">
<img src="https://via.placeholder.com/400x200?text=Tower+Defense">
<h3>Tower Defense</h3>
<a class="play-btn" href="https://lucascoto98.github.io/TOWERDEFENSE/" target="_blank">Jogar</a>
</div>

<div class="card">
<img src="https://via.placeholder.com/400x200?text=Cyber+Runner">
<h3>Cyber Runner</h3>
<a class="play-btn" href="https://lucascoto98.github.io/CYBER-RUNNER/" target="_blank">Jogar</a>
</div>

<div class="card">
<img src="https://via.placeholder.com/400x200?text=Neon+Jump">
<h3>Neon Jump</h3>
<a class="play-btn" href="https://lucascoto98.github.io/neon-jump-game/" target="_blank">Jogar</a>
</div>

<div class="card">
<img src="https://via.placeholder.com/400x200?text=Fireeee">
<h3>Fireeee</h3>
<a class="play-btn" href="https://lucascoto98.github.io/Fireeee/" target="_blank">Jogar</a>
</div>

<div class="card">
<img src="https://via.placeholder.com/400x200?text=Snake+Pro">
<h3>Snake Pro</h3>
<a class="play-btn" href="https://lucascoto98.github.io/Snake-Game---Pro/" target="_blank">Jogar</a>
</div>

<div class="card">
<img src="https://via.placeholder.com/400x200?text=Square+Survivor">
<h3>Square Survivor</h3>
<a class="play-btn" href="https://lucascoto98.github.io/square-survivor/" target="_blank">Jogar</a>
</div>

<div class="card">
<img src="https://via.placeholder.com/400x200?text=Kick+Ball">
<h3>Kick Ball</h3>
<a class="play-btn" href="https://lucascoto98.github.io/Kick-Ball/" target="_blank">Jogar</a>
</div>

<div class="card">
<img src="https://via.placeholder.com/400x200?text=Game+Car">
<h3>Game Car</h3>
<a class="play-btn" href="https://lucascoto98.github.io/game-car/" target="_blank">Jogar</a>
</div>

</div>

</body>
</html>
