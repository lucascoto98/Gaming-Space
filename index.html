<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Gaming Space</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

body {
    display: flex;
    background: #0f172a;
    color: white;
}

/* SIDEBAR */
.sidebar {
    width: 200px;
    background: #020617;
    height: 100vh;
    padding: 20px;
}

.sidebar h2 {
    color: #38bdf8;
    margin-bottom: 20px;
}

.sidebar a {
    display: block;
    color: #94a3b8;
    text-decoration: none;
    margin: 10px 0;
    transition: 0.2s;
}

.sidebar a:hover {
    color: white;
}

/* MAIN */
.main {
    flex: 1;
    padding: 20px;
}

/* TOP BAR */
.topbar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

.search {
    width: 300px;
    padding: 10px;
    border-radius: 10px;
    border: none;
}

/* GRID */
.games {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
}

/* CARD */
.card {
    background: #1e293b;
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-5px) scale(1.03);
}

.card img {
    width: 100%;
    height: 140px;
    object-fit: cover;
}

.card h3 {
    padding: 10px;
}

.play {
    display: block;
    margin: 10px;
    padding: 8px;
    background: #38bdf8;
    color: black;
    text-align: center;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
}
</style>

</head>
<body>

<div class="sidebar">
    <h2>🎮 Gaming Space</h2>
    <a href="#">🏠 Home</a>
    <a href="#">🔥 Popular</a>
    <a href="#">🆕 Novos</a>
    <a href="#">⭐ Favoritos</a>
</div>

<div class="main">

    <div class="topbar">
        <input class="search" placeholder="Procurar jogos...">
    </div>

    <div class="games">

        <div class="card">
            <img src="https://picsum.photos/400/200?1">
            <h3>Tower Defense</h3>
            <a class="play" href="https://lucascoto98.github.io/TOWERDEFENSE/" target="_blank">Jogar</a>
        </div>

        <div class="card">
            <img src="https://picsum.photos/400/200?2">
            <h3>Cyber Runner</h3>
            <a class="play" href="https://lucascoto98.github.io/CYBER-RUNNER/" target="_blank">Jogar</a>
        </div>

        <div class="card">
            <img src="https://picsum.photos/400/200?3">
            <h3>Neon Jump</h3>
            <a class="play" href="https://lucascoto98.github.io/neon-jump-game/" target="_blank">Jogar</a>
        </div>

        <div class="card">
            <img src="https://picsum.photos/400/200?4">
            <h3>Fireeee</h3>
            <a class="play" href="https://lucascoto98.github.io/Fireeee/" target="_blank">Jogar</a>
        </div>

        <div class="card">
            <img src="https://picsum.photos/400/200?5">
            <h3>Snake Pro</h3>
            <a class="play" href="https://lucascoto98.github.io/Snake-Game---Pro/" target="_blank">Jogar</a>
        </div>

        <div class="card">
            <img src="https://picsum.photos/400/200?6">
            <h3>Square Survivor</h3>
            <a class="play" href="https://lucascoto98.github.io/square-survivor/" target="_blank">Jogar</a>
        </div>

        <div class="card">
            <img src="https://picsum.photos/400/200?7">
            <h3>Kick Ball</h3>
            <a class="play" href="https://lucascoto98.github.io/Kick-Ball/" target="_blank">Jogar</a>
        </div>

        <div class="card">
            <img src="https://picsum.photos/400/200?8">
            <h3>Game Car</h3>
            <a class="play" href="https://lucascoto98.github.io/game-car/" target="_blank">Jogar</a>
        </div>

    </div>

</div>

</body>
</html>
